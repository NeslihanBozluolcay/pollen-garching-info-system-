<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollen Severity – Garching</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #e8f5c8, #cde7a3);
            overflow: hidden;
        }

        /* Pollen particles */
        .pollen {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 220, 120, 0.8);
            border-radius: 50%;
            animation: float 12s linear infinite;
        }

        /* Different sizes & speeds */
        .pollen:nth-child(1) { left: 10%; animation-duration: 14s; }
        .pollen:nth-child(2) { left: 25%; width: 4px; height: 4px; animation-duration: 10s; }
        .pollen:nth-child(3) { left: 40%; animation-duration: 16s; }
        .pollen:nth-child(4) { left: 55%; width: 5px; height: 5px; animation-duration: 11s; }
        .pollen:nth-child(5) { left: 70%; animation-duration: 18s; }
        .pollen:nth-child(6) { left: 85%; width: 4px; height: 4px; animation-duration: 13s; }

        @keyframes float {
            0% {
                bottom: -10px;
                opacity: 0;
                transform: translateX(0);
            }
            20% {
                opacity: 1;
            }
            100% {
                bottom: 110%;
                opacity: 0;
                transform: translateX(40px);
            }
        }

        h1 {
            margin-top: 40px;
            color: #4a6b2f;
            background: rgba(255, 255, 255, 0.85);
            display: inline-block;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>

    <!-- Floating pollen -->
    <div class="pollen"></div>
    <div class="pollen"></div>
    <div class="pollen"></div>
    <div class="pollen"></div>
    <div class="pollen"></div>
    <div class="pollen"></div>

    <center>
        <h1>Pollen Severity Level in Garching</h1>
    </center>

</body>
</html>
