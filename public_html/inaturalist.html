<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree Info</title>
  <style>
    .taxon-card {
      border: 1px solid #ccc;
      padding: 20px;
      max-width: 400px;
      margin: 20px auto;
      text-align: center;
      font-family: Arial, sans-serif;
      border-radius: 10px;
      box-shadow: 2px 2px 12px rgba(0,0,0,0.1);
    }
    .taxon-card img {
      max-width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div id="taxon-container">
    <p>Loading tree information...</p>
  </div>

  <script>
    // Get the "tree" query parameter from the URL
    function getQueryParam(param) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(param);
    }

    const treeQuery = getQueryParam('tree'); // e.g., ?tree=birch

    if (treeQuery) {
      fetchTreeInfo(treeQuery);
    } else {
      document.getElementById('taxon-container').innerHTML = "<p>No tree specified in the URL.</p>";
    }

    // Fetch tree information from iNaturalist API
    function fetchTreeInfo(query) {
      const url = `https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(query)}&per_page=1`;

      fetch(url)
        .then(response => response.json())
        .then(data => {
          const container = document.getElementById('taxon-container');
          container.innerHTML = ''; // Clear loading message

          if (data.results.length === 0) {
            container.innerHTML = "<p>No results found.</p>";
            return;
          }

          const taxon = data.results[0];

          const taxonHTML = `
            <div class="taxon-card">
              <h2>${taxon.preferred_common_name || taxon.name}</h2>
              ${taxon.default_photo ? `<img src="${taxon.default_photo.medium_url}" alt="${taxon.name}">` : ''}
              <p><strong>Scientific Name:</strong> ${taxon.name}</p>
              <p><strong>Rank:</strong> ${taxon.rank}</p>
              <p><strong>Observations Count:</strong> ${taxon.observations_count}</p>
              <p><strong>Conservation Status:</strong> ${taxon.conservation_status ? taxon.conservation_status.status : 'N/A'}</p>
            </div>
          `;

          container.innerHTML = taxonHTML;
        })
        .catch(err => {
          console.error("Error fetching data:", err);
          document.getElementById('taxon-container').innerHTML = "<p>Error fetching data.</p>";
        });
    }
  </script>
</body>
</html>
