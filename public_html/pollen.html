<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Pollen Levels – Garching</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #f9f9f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 16px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 1.6em;
    font-weight: 700;
    color: #2e7d32;
    letter-spacing: -0.5px;
  }

  .header p {
    color: #66bb6a;
    font-size: 0.85em;
    margin-top: 2px;
  }

  /* ── Status ── */
  #status {
    font-size: 1em;
    color: #777;
  }


  #cards {
    flex: 1;
    min-height: 0;           /* critical: allows flex child to shrink below content size */
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }


  .card {
    flex: 1;
    min-height: 0;
    border-radius: 14px;
    box-shadow: 0 3px 14px rgba(0,0,0,0.08);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    overflow: hidden;
  }

  
  .card-bg-1 { background: #f1f8e9; }  /* Low      – light green  */
  .card-bg-2 { background: #fffde7; }  /* Moderate – light yellow */
  .card-bg-3 { background: #fff3e0; }  /* High     – light orange */
  .card-bg-4 { background: #ffebee; }  /* Extreme  – light red    */

 
  .badge {
    font-size: 0.65em;
    font-weight: 600;
    background: #e8f5e9;
    color: #388e3c;
    border-radius: 20px;
    padding: 2px 9px;
    white-space: nowrap;
    border: 1px solid #c8e6c9;
    flex-shrink: 0;
  }

  
  .pollen-name {
    flex: 1;
    font-size: 1.4em;
    font-weight: 700;
    color: #1b5e20;
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  
  .level-pill {
    font-size: 0.9em;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 30px;
    color: #fff;
    min-width: 100px;
    text-align: center;
    flex-shrink: 0;
  }

  .lvl-1 { background: #43a047; }
  .lvl-2 { background: #fbc02d; color: #333; }
  .lvl-3 { background: #ef6c00; }
  .lvl-4 { background: #c62828; }

 
  .qr-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    justify-self: end;
  }

  .qr-hint {
    font-size: 0.6em;
    color: #aaa;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Pollen Levels in Garching</h1>
  <p>Live data — Donnerwetter.de</p>
</div>

<div id="status">Loading pollen data...</div>
<div id="cards"></div>

<script>
var emojiMap = {
  'Alder':      '🌿', 'Hazel':      '🌰', 'Birch':   '🌲', 'Beech':     '🍂',
  'Oak':        '🍂', 'Ash':        '🌳', 'Elm':     '🌳', 'Poplar':    '🌳',
  'Willow':     '🌿', 'Maple':      '🍁', 'Linden':  '🌸', 'Plane Tree':'🌳',
  'Lilac':      '🌸', 'Elder':      '🌼', 'Pine':    '🌲', 'Fir':       '🌲',
  'Spruce':     '🌲', 'Grasses':    '🌾', 'Rye':     '🌾', 'Wheat':     '🌾',
  'Barley':     '🌾', 'Oat':        '🌾', 'Corn':    '🌽', 'Rapeseed':  '🌼',
  'Mugwort':    '🌿', 'Ragweed':    '🌿', 'Nettle':  '🌿', 'Plantain':  '🌿',
  'Dandelion':  '🌼', 'Goosefoot':  '🌿', 'Hop':     '🍺'
};

var scientificMap = {
  'Alder': 'Alnus', 'Hazel': 'Corylus', 'Birch': 'Betula', 'Beech': 'Fagus',
  'Oak': 'Quercus', 'Ash': 'Fraxinus', 'Elm': 'Ulmus', 'Poplar': 'Populus',
  'Willow': 'Salix', 'Maple': 'Acer', 'Linden': 'Tilia', 'Plane Tree': 'Platanus',
  'Lilac': 'Syringa', 'Elder': 'Sambucus', 'Pine': 'Pinus', 'Fir': 'Abies',
  'Spruce': 'Picea', 'Grasses': 'Poaceae', 'Rye': 'Secale', 'Wheat': 'Triticum',
  'Barley': 'Hordeum', 'Oat': 'Avena', 'Corn': 'Zea', 'Rapeseed': 'Brassica',
  'Mugwort': 'Artemisia', 'Ragweed': 'Ambrosia', 'Nettle': 'Urtica',
  'Plantain': 'Plantago', 'Dandelion': 'Taraxacum', 'Goosefoot': 'Chenopodium',
  'Hop': 'Humulus'
};

fetch('pollen_proxy.php')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    document.getElementById('status').remove();

    if (data.error) {
      var err = document.createElement('p');
      err.textContent = 'Error: ' + data.error;
      err.style.color = 'red';
      document.getElementById('cards').appendChild(err);
      return;
    }

    var active = data.pollen;

    if (!active || active.length === 0) {
      var msg = document.createElement('p');
      msg.textContent = 'No active pollen at the moment.';
      msg.style.color = '#777';
      document.getElementById('cards').appendChild(msg);
      return;
    }

    var count = active.length;
    var useGrid = count >= 6;
    var rows = useGrid ? Math.ceil(count / 2) : count;
    var cardsEl = document.getElementById('cards');

    if (useGrid) {
      cardsEl.style.display = 'grid';
      cardsEl.style.gridTemplateColumns = '1fr 1fr';
      cardsEl.style.gridAutoRows = '1fr';
    }

    var headerH = document.querySelector('.header').offsetHeight;
    var bodyPad = 32; // 16px top + 16px bottom
    var gapTotal = 8 * (rows - 1);
    var availH = window.innerHeight - headerH - bodyPad - gapTotal;
    var perCard = Math.floor(availH / rows);

    var qrSize       = Math.min(90, Math.max(28, perCard - 14));
    var showHint     = perCard >= 60;
    var nameFontSize = perCard < 52 ? '0.9em' : perCard < 70 ? '1.1em' : '1.4em';
    var pillPad      = perCard < 52 ? '3px 10px' : '6px 18px';
    var pillMinW     = perCard < 52 ? '72px' : '100px';
    var cardPad      = perCard < 52 ? '0 12px' : '0 24px';

    active.forEach(function(p, i) {
      var emoji = emojiMap[p.name] || '🌱';
      var card = document.createElement('div');
      card.className = 'card card-bg-' + p.level;f
      card.style.padding = cardPad;
      card.innerHTML =
        '<div class="pollen-name" style="font-size:' + nameFontSize + '">' +
          '<span class="badge">' + p.category_name + '</span>' +
          '<span>' + emoji + ' ' + p.name + '</span>' +
        '</div>' +
        '<div class="level-pill lvl-' + p.level + '" style="padding:' + pillPad + ';min-width:' + pillMinW + '">' + p.level_label + '</div>' +
        '<div class="qr-wrap">' +
          '<div id="qr' + i + '"></div>' +
          (showHint ? '<span class="qr-hint">Scan for info</span>' : '') +
        '</div>';
      cardsEl.appendChild(card);

      new QRCode(document.getElementById('qr' + i), {
        text: 'https://lehre.bpm.in.tum.de/~ge32puf/send.php?info=' + encodeURIComponent(scientificMap[p.name] || p.name) + '&cb=' + encodeURIComponent(window.name),
        width: qrSize,
        height: qrSize,
        colorDark: '#1b5e20',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.L
      });
    });
  })
  .catch(function(err) {
    document.getElementById('status').textContent = 'Error: ' + err;
  });
</script>
</body>
</html>
